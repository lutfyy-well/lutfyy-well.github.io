<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album Kenangan - Website Lutfyy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a192f 0%, #172a45 50%, #0a192f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #e6f1ff;
    }

    /* Navbar Styles */
    .navbar {
      background: linear-gradient(90deg, #0a192f 0%, #112240 100%);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(2, 12, 27, 0.7);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(100, 255, 218, 0.1);
    }

    .logo {
      color: #64ffda;
      font-size: 1.8rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      text-shadow: 0 0 10px rgba(100, 255, 218, 0.5);
    }

    .logo i {
      margin-right: 10px;
      color: #64ffda;
    }

    .nav-links {
      display: flex;
      list-style: none;
    }

    .nav-links li {
      margin-left: 2rem;
    }

    .nav-links a {
      color: #ccd6f6;
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #64ffda;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: 0;
      left: 0;
      background-color: #64ffda;
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after, .nav-links a.active::after {
      width: 100%;
    }

    .hamburger {
      display: none;
      cursor: pointer;
      color: #ccd6f6;
      font-size: 1.5rem;
      transition: color 0.3s ease;
    }

    .hamburger:hover {
      color: #64ffda;
    }

    /* Container Styles */
    .container {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* Header Styles */
    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .page-header h1 {
      color: #ccd6f6;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #8892b0;
      font-size: 0.5rem;
      margin-bottom: 1rem;
    }

    /* Audio Player Styles */
    .audio-player {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 1rem 0 2rem;
      gap: 1rem;
    }

    .audio-player button {
      background: linear-gradient(145deg, #64ffda, #4fc1b8);
      color: #0a192f;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(2, 12, 27, 0.5);
    }

    .audio-player button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(100, 255, 218, 0.4);
    }

    /* Gallery Styles */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .gallery-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(2, 12, 27, 0.5);
      cursor: pointer;
      height: 250px;
      background: linear-gradient(145deg, #112240, #0a192f);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #64ffda;
      font-size: 3rem;
      transition: all 0.3s ease;
      border: 1px solid rgba(100, 255, 218, 0.1);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover {
      transform: translateY(-7px);
      box-shadow: 0 15px 30px rgba(2, 12, 27, 0.7);
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(10, 25, 47, 0.95);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(100, 255, 218, 0.3);
    }

    .modal-content img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #64ffda;
      font-size: 40px;
      cursor: pointer;
      text-shadow: 0 0 10px rgba(2, 12, 27, 0.7);
      transition: all 0.3s ease;
    }

    .close-modal:hover {
      color: #ccd6f6;
    }

    /* Footer Styles */
    .footer {
      background: linear-gradient(90deg, #0a192f 0%, #112240 100%);
      color: #8892b0;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(100, 255, 218, 0.1);
    }

    .footer ul {
      list-style: none;
    }

    .social-icons a {
      color: #ccd6f6;
      margin-left: 1rem;
      font-size: 1.5rem;
      transition: all 0.3s ease;
    }

    .social-icons a:hover {
      color: #64ffda;
      transform: translateY(-3px);
      text-shadow: 0 0 10px rgba(100, 255, 218, 0.5);
    }

    /* Responsive Styles */
    @media screen and (max-width: 768px) {
      .navbar {
        padding: 1rem;
      }
      
      .nav-links {
        position: fixed;
        height: 100vh;
        width: 100%;
        flex-direction: column;
        clip-path: circle(0px at 90% -10%);
        -webkit-clip-path: circle(0px at 90% -10%);
        background: linear-gradient(135deg, #112240 0%, #0a192f 100%);
        transition: all 0.8s ease-out;
        pointer-events: none;
        top: 0;
        left: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 2rem;
      }
      
      .nav-links.open {
        clip-path: circle(1500px at 90% -10%);
        -webkit-clip-path: circle(1500px at 90% -10%);
        pointer-events: all;
      }
      
      .nav-links li {
        margin: 0;
      }
      
      .nav-links a {
        font-size: 1.5rem;
        padding: 1rem 2rem;
      }
      
      .hamburger {
        display: block;
        z-index: 1001;
      }
      
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 1rem;
      }
      
      .gallery-item {
        height: 150px;
        font-size: 2rem;
      }
      
      .footer {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
      
      .social-icons {
        margin-top: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <i class="fas fa-user-astronaut"></i>
      <span>Lutfyy</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html"><i class="fas fa-home"></i> HOME</a></li>
      <li><a href="tentang.html"><i class="fas fa-user"></i> TENTANG</a></li>
      <li><a href="kenangan.html" class="active"><i class="fas fa-images"></i> KENANGAN</a></li>
    </ul>
    
    <div class="hamburger">
      <i class="fas fa-bars"></i>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <header class="page-header">
      <h1>MY KENANGAN INDAH</h1>
      <div class="subtitle">Kumpulan my kenangan indah jir (when ya sama dia)</div>
      
      <!-- Audio Player -->
      <div class="audio-player">
        <button id="playMusic"><i class="fas fa-play"></i> Putar Musik</button>
        <button id="pauseMusic"><i class="fas fa-pause"></i> Jeda</button>
        <audio id="backgroundMusic" loop>
          <source src="partyanthem.mp3" type="audio/mpeg">
          Browser Anda tidak mendukung elemen audio.
        </audio>
      </div>
    </header>

    <div class="gallery">
      <div class="gallery-item">
        <img src="botak.jpg" alt="Kenangan Botak" onclick="openModal(this)">
      </div>
      <div class="gallery-item">
        <img src="osis.jpg" alt="Masa OSIS" onclick="openModal(this)">
      </div>
      <div class="gallery-item">
        <img src="osis2.jpg" alt="Masa OSIS 2" onclick="openModal(this)">
      </div>
      <div class="gallery-item">
        <img src="paskib1.jpg" alt="Paskibra 1" onclick="openModal(this)">
      </div>
      <div class="gallery-item">
        <img src="paskib2.jpg" alt="Paskibra 2" onclick="openModal(this)">
      </div>
      <div class="gallery-item">
        <img src="paskib3.jpg" alt="Paskibra 3" onclick="openModal(this)">
      </div>
      <div class="gallery-item">
        <img src="paskib4.jpg" alt="Paskibra 4" onclick="openModal(this)">
      </div>
      <!-- Gambar kelas yang ditambahkan -->
      <div class="gallery-item">
        <img src="kelas.jpg" alt="Kenangan Kelas" onclick="openModal(this)">
      </div>
    </div>
  </div>
  <!-- Modal for Image View -->
  <div id="imageModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="modalImage">
  </div>

  <!-- Footer -->
  <div class="footer">
    <ul>
      <li>© 2025 Lutfyy.</li>
    </ul>
    <div class="social-icons">
      <a href="https://www.instagram.com/lutxzyfza" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@buitenlanders22" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>

  <script>
    // Toggle mobile menu
    const hamburger = document.querySelector('.hamburger');
    const navLinks = document.querySelector('.nav-links');
    
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('open');
      hamburger.innerHTML = navLinks.classList.contains('open') 
        ? '<i class="fas fa-times"></i>' 
        : '<i class="fas fa-bars"></i>';
    });
    
    // Close menu when clicking on a link
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('open');
        hamburger.innerHTML = '<i class="fas fa-bars"></i>';
      });
    });
    
    // Audio control
    const audio = document.getElementById('backgroundMusic');
    const playButton = document.getElementById('playMusic');
    const pauseButton = document.getElementById('pauseMusic');
    
    playButton.addEventListener('click', () => {
      audio.play();
      playButton.innerHTML = '<i class="fas fa-volume-up"></i> Musik Diputar';
    });
    
    pauseButton.addEventListener('click', () => {
      audio.pause();
      playButton.innerHTML = '<i class="fas fa-play"></i> Putar Musik';
    });
    
    // Modal functionality for images
    function openModal(element) {
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImage');
      modal.style.display = 'flex';
      modalImg.src = element.src;
    }
    
    function closeModal() {
      document.getElementById('imageModal').style.display = 'none';
    }
    
    // Close modal when clicking outside the image
    window.addEventListener('click', function(event) {
      const modal = document.getElementById('imageModal');
      if (event.target === modal) {
        closeModal();
      }
    });
  </script>
</body>
        </html>
